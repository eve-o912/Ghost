[profile.default]
src = "src"
out = "out"
libs = ["lib"]

# Solidity version
solc_version = "0.8.20"
optimizer = true
optimizer_runs = 200

# Somnia Testnet (Shannon) Configuration
[rpc_endpoints]
somnia-testnet = "https://dream-rpc.somnia.network"
somnia-mainnet = "https://api.infra.mainnet.somnia.network"

[etherscan]
somnia-testnet = { key = "", url = "https://shannon-explorer.somnia.network/api" }
somnia-mainnet = { key = "", url = "https://explorer.somnia.network/api" }

# See more config options https://github.com/foundry-rs/foundry/tree/master/config
